overrides:
  # @better-auth/kysely-adapter@1.6.13 importa DEFAULT_MIGRATION_LOCK_TABLE,
  # que kysely eliminó en 0.29. Pinneamos a 0.28.x (dentro de su rango peer)
  # para que el bundle del route handler /api/auth compile en Turbopack.
  kysely: 0.28.17
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
ignoredBuiltDependencies:
  - unrs-resolver
minimumReleaseAgeExclude:
  - '@better-auth/core@1.6.13'
  - '@better-auth/drizzle-adapter@1.6.13'
  - '@better-auth/kysely-adapter@1.6.13'
  - '@better-auth/memory-adapter@1.6.13'
  - '@better-auth/mongo-adapter@1.6.13'
  - '@better-auth/prisma-adapter@1.6.13'
  - '@better-auth/telemetry@1.6.13'
  - better-auth@1.6.13
  - tsx@4.22.4
